name: Concurrency & Testing Guardrail

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guardrail:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.AETHERAG_PAT }}
      - name: Select latest available Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$LATEST_XCODE" ]; then
            LATEST_XCODE=/Applications/Xcode.app
          fi
          echo "Selecting Xcode at: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version
      - name: Run guardrail
        run: scripts/guardrail_testing_concurrency.sh
