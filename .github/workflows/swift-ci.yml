name: Swift CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.AETHERAG_PAT }}

      - name: Select latest available Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$LATEST_XCODE" ]; then
            LATEST_XCODE=/Applications/Xcode.app
          fi
          echo "Selecting Xcode at: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          swift --version

      - name: Build AGWallet and AetherAG
        run: |
          cd AGWallet
          swift build
          cd ../AetherAG
          swift build

      - name: Test AetherAG
        run: |
          cd AetherAG
          swift test
